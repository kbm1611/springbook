<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>블로그 글</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">
</head>

<body>
    <div class="p-5 mb-5 text-center</> bg-light">
        <h1 class="mb-3">My Blog</h1>
        <h4 class="mb-3">블로그에 오신 것을 환영합니다.</h4>
    </div>

    <a class="p-3 ml-3" href="/articles">뒤로 가기</a>
    <div class="container mt-5">
        <div class="row">
            <div class="col-lg-8">
                <article>
                    <input type="hidden" id="article-id" th:value="${article.id}">
                    <header class="mb-4">
                        <h1 class="fw-bolder mb-1" th:text="${article.title}"></h1>
                        <div class="text-muted fst-italic mb-2">
                            <span
                                th:text="|Posted on ${#temporals.format(article.createdAt, 'yyyy-MM-dd HH:mm')}|"></span>
                            <span class="ml-3" th:text="|조회수: ${article.views}|"></span>
                        </div>
                    </header>
                    <section class="mb-5">
                        <p class="fs-5 mb-4" th:text="${article.content}"></p>
                    </section>
                    <button type="button" id="modify-btn"
                        th:onClick="|location.href='@{/articles/new-article?id={articleId}(articleId=${article.id})}'|"
                        class="btn btn-primary btn-sm">수정</button>
                    <button type="button" id="delete-btn" class="btn btn-secondary btn-sm">삭제</button>
                </article>
                <reply>
                    <div class="mt-5">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h4>댓글 목록</h4>
                            <button type="button" id="replycreate-btn"
                                class="btn btn-secondary btn-sm">댓글 등록</button>
                        </div>

                        <div class="card mb-3" th:each="item : ${replies}">
                            <div class="card-header d-flex justify-content-between align-items-center">
                                <small class="text-muted"
                                    th:text="${#temporals.format(item.createdAt, 'yyyy-MM-dd HH:mm')}"></small>
                                <button type="button"
                                    class="btn btn-sm btn-outline-danger reply-del-btn"
                                    th:data-id="${item.id}">
                                    삭제
                                </button>
                            </div>
                            <div class="card-body">
                                <p class="card-text" th:text="${item.content}"></p>
                            </div>
                        </div>
                        <div th:if="${#lists.isEmpty(replies)}" class="text-center text-muted">
                            <p>첫 번째 댓글을 남겨보세요!</p>
                        </div>
                    </div>
                </reply>
            </div>
        </div>
    </div>

    <script src="/js/article.js"></script>
</body>

</html>
